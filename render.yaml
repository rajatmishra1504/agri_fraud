services:
  - type: web
    name: agri-fraud-server
    env: node
    plan: free
    buildCommand: "npm install && cd client && npm install && npm run build"
    startCommand: "npm run migrate:bootstrap && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: agri-fraud-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: CI
        value: "false"
      - key: FRONTEND_URL
        value: https://agri-fraud-server.onrender.com
    autoDeploy: true

databases:
  - name: agri-fraud-db
    plan: free
    databaseName: agri_fraud_db
    user: agriuser
